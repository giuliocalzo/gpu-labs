# Helm values for the Kueue chart (pinned to KUEUE_VERSION in lib/common.sh).
#
# We override the controller-manager config to enable Fair Sharing. The chart's
# controllerManagerConfigYaml is a single opaque string, so we must restate the
# default active settings here - in particular the full integrations list, which
# includes "leaderworkerset.x-k8s.io/leaderworkerset" (needed by the TAS
# scenario). If you bump KUEUE_VERSION, re-diff against:
#   helm show values oci://registry.k8s.io/kueue/charts/kueue --version <v>

# Enable Kueue's DRA integration (used by the kueue-dra scenario). Inert for the
# other scenarios - it only matters once a mapped DeviceClass + claims exist.
controllerManager:
  featureGates:
  - name: KueueDRAIntegration
    enabled: true

managerConfig:
  controllerManagerConfigYaml: |-
    apiVersion: config.kueue.x-k8s.io/v1beta2
    kind: Configuration
    health:
      healthProbeBindAddress: :8081
    metrics:
      bindAddress: :8443
    webhook:
      port: 9443
    leaderElection:
      leaderElect: true
      resourceName: c1f6bfd2.kueue.x-k8s.io
    controller:
      groupKindConcurrency:
        Job.batch: 5
        Pod: 5
        Workload.kueue.x-k8s.io: 5
        LocalQueue.kueue.x-k8s.io: 1
        ClusterQueue.kueue.x-k8s.io: 1
        ResourceFlavor.kueue.x-k8s.io: 1
    clientConnection:
      qps: 50
      burst: 100
    integrations:
      frameworks:
      - "batch/job"
      - "kubeflow.org/mpijob"
      - "ray.io/rayjob"
      - "ray.io/rayservice"
      - "ray.io/raycluster"
      - "jobset.x-k8s.io/jobset"
      - "trainer.kubeflow.org/trainjob"
      - "kubeflow.org/paddlejob"
      - "kubeflow.org/pytorchjob"
      - "kubeflow.org/tfjob"
      - "kubeflow.org/xgboostjob"
      - "kubeflow.org/jaxjob"
      - "workload.codeflare.dev/appwrapper"
      - "pod"
      - "deployment"
      - "statefulset"
      - "leaderworkerset.x-k8s.io/leaderworkerset"
    # Fair Sharing is enabled by the presence of this block (v1beta2 config has
    # no "enable" field - only preemptionStrategies).
    fairSharing:
      preemptionStrategies:
      - LessThanOrEqualToFinalShare
      - LessThanInitialShare
    # DRA: map the DeviceClass to a logical quota resource so the kueue-dra
    # scenario can put DRA devices under ClusterQueue quota. Inert until the
    # "gpu.nvidia.com" DeviceClass and matching claims exist.
    resources:
      deviceClassMappings:
      - name: nvidia.com/gpu
        deviceClassNames:
        - gpu.nvidia.com
