# kueue-tas scenario (scenarios/kueue-tas/manifests/flavors.yaml).
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: gpu-flavor
spec:
  nodeLabels:
    cloud.provider.com/node-group: tas-group
