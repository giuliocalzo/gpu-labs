# Scenario-scoped Kueue values: this is base/kueue-values.yaml PLUS a
# waitForPodsReady block. It is applied by this scenario's pre_run (helm upgrade)
# and reverted to base by cleanup, so waitForPodsReady stays off for every other
# scenario (a short timeout would wrongly evict slow-starting workloads such as
# kueue-rayjob's real image pulls).
#
# Keep the config below in sync with base/kueue-values.yaml; the only addition is
# the waitForPodsReady block.
controllerManager:
  featureGates:
  - name: KueueDRAIntegration
    enabled: true

managerConfig:
  controllerManagerConfigYaml: |-
    apiVersion: config.kueue.x-k8s.io/v1beta2
    kind: Configuration
    health:
      healthProbeBindAddress: :8081
    metrics:
      bindAddress: :8443
    webhook:
      port: 9443
    leaderElection:
      leaderElect: true
      resourceName: c1f6bfd2.kueue.x-k8s.io
    controller:
      groupKindConcurrency:
        Job.batch: 5
        Pod: 5
        Workload.kueue.x-k8s.io: 5
        LocalQueue.kueue.x-k8s.io: 1
        ClusterQueue.kueue.x-k8s.io: 1
        ResourceFlavor.kueue.x-k8s.io: 1
    clientConnection:
      qps: 50
      burst: 100
    # The whole reason for this scenario: admitted Workloads whose pods do not all
    # become Ready within `timeout` are evicted and requeued. A short 30s timeout
    # makes the requeue observable in a demo. backoffLimitCount caps the retries.
    # In the v1beta2 config the feature is enabled by the presence of this block
    # (there is no `enable` field); `timeout` is required.
    waitForPodsReady:
      timeout: 30s
      blockAdmission: true
      requeuingStrategy:
        timestamp: Eviction
        backoffLimitCount: 100
    integrations:
      frameworks:
      - "batch/job"
      - "kubeflow.org/mpijob"
      - "ray.io/rayjob"
      - "ray.io/rayservice"
      - "ray.io/raycluster"
      - "jobset.x-k8s.io/jobset"
      - "trainer.kubeflow.org/trainjob"
      - "kubeflow.org/paddlejob"
      - "kubeflow.org/pytorchjob"
      - "kubeflow.org/tfjob"
      - "kubeflow.org/xgboostjob"
      - "kubeflow.org/jaxjob"
      - "workload.codeflare.dev/appwrapper"
      - "pod"
      - "deployment"
      - "statefulset"
      - "leaderworkerset.x-k8s.io/leaderworkerset"
    fairSharing:
      preemptionStrategies:
      - LessThanOrEqualToFinalShare
      - LessThanInitialShare
    resources:
      deviceClassMappings:
      - name: nvidia.com/gpu
        deviceClassNames:
        - gpu.nvidia.com
