# A 2-pod gang (parallelism/completions 2, each claiming a whole 8-GPU node) that
# is admitted fine but whose pods NEVER become Ready: the container runs, but its
# readinessProbe (`exec: false`) always fails. With waitForPodsReady enabled and
# a 30s timeout, Kueue evicts the whole Workload and requeues it - repeatedly -
# because the gang never reaches all-pods-Ready. This is the failure mode
# waitForPodsReady exists to catch (e.g. a broken image, a wedged init, a pod
# that never passes its health check).
apiVersion: batch/v1
kind: Job
metadata:
  name: never-ready
  namespace: wait-ready
  labels:
    kueue.x-k8s.io/queue-name: wait-ready-queue
spec:
  parallelism: 2
  completions: 2
  suspend: true
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          # Always-failing readiness probe: the pod is Running but never Ready.
          readinessProbe:
            exec:
              command: ["false"]
            periodSeconds: 5
            failureThreshold: 1
          resources:
            requests:
              cpu: "50m"
              nvidia.com/gpu: "8"
            limits:
              nvidia.com/gpu: "8"
