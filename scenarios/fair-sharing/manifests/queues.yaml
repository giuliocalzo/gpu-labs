apiVersion: v1
kind: Namespace
metadata:
  name: team-a
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-b
---
# Two ClusterQueues in the same cohort "teams". Each owns 32 GPUs nominally,
# but can borrow up to the cohort total (64). fairSharing + reclaimWithinCohort
# let an idle team's quota be borrowed and later reclaimed by preemption.
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: team-a-cq
spec:
  namespaceSelector: {}
  cohortName: teams
  fairSharing:
    weight: 1
  preemption:
    reclaimWithinCohort: Any
    withinClusterQueue: LowerPriority
  resourceGroups:
    - coveredResources: ["cpu", "nvidia.com/gpu"]
      flavors:
        - name: gpu-flavor
          resources:
            - name: cpu
              nominalQuota: "100"
            - name: nvidia.com/gpu
              nominalQuota: "32"
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: team-b-cq
spec:
  namespaceSelector: {}
  cohortName: teams
  fairSharing:
    weight: 1
  preemption:
    reclaimWithinCohort: Any
    withinClusterQueue: LowerPriority
  resourceGroups:
    - coveredResources: ["cpu", "nvidia.com/gpu"]
      flavors:
        - name: gpu-flavor
          resources:
            - name: cpu
              nominalQuota: "100"
            - name: nvidia.com/gpu
              nominalQuota: "32"
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  namespace: team-a
  name: team-a-queue
spec:
  clusterQueue: team-a-cq
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  namespace: team-b
  name: team-b-queue
spec:
  clusterQueue: team-b-cq
