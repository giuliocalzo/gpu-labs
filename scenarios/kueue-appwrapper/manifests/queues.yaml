apiVersion: v1
kind: Namespace
metadata:
  name: appwrapper
---
# Quota covers cpu + nvidia.com/gpu. nvidia.com/gpu is the binding constraint:
# one AppWrapper wraps a Job of 2 pods x 8 GPUs = 16 GPUs, so the quota of 16
# admits exactly one AppWrapper. A second AppWrapper's whole gang stays Pending
# until the first releases its GPUs.
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: appwrapper-cq
spec:
  namespaceSelector: {}
  resourceGroups:
    - coveredResources: ["cpu", "nvidia.com/gpu"]
      flavors:
        - name: gpu-flavor
          resources:
            - name: cpu
              nominalQuota: "100"
            - name: nvidia.com/gpu
              nominalQuota: "16"
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  namespace: appwrapper
  name: appwrapper-queue
spec:
  clusterQueue: appwrapper-cq
