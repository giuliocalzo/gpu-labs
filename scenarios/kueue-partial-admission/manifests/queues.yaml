apiVersion: v1
kind: Namespace
metadata:
  name: partial-admission
---
# Quota is deliberately smaller than the Job's full request. The Job wants
# 8 pods x 8 GPUs = 64 GPUs, but this ClusterQueue only grants nvidia.com/gpu: 40
# (= 5 pods). With partial admission Kueue admits the Job at the largest
# parallelism that fits the quota (5), instead of leaving it fully Pending.
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: partial-cq
spec:
  namespaceSelector: {}
  resourceGroups:
    - coveredResources: ["cpu", "nvidia.com/gpu"]
      flavors:
        - name: gpu-flavor
          resources:
            - name: cpu
              nominalQuota: "100"
            - name: nvidia.com/gpu
              nominalQuota: "40"
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  namespace: partial-admission
  name: partial-queue
spec:
  clusterQueue: partial-cq
