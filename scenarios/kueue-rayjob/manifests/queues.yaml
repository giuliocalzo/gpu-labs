apiVersion: v1
kind: Namespace
metadata:
  name: rayjob
---
# Quota covers cpu + memory (the Ray head/worker request both) and nvidia.com/gpu.
# nvidia.com/gpu is the binding constraint: 8 GPUs = exactly one RayJob's worker,
# so a second RayJob's whole Ray cluster stays Pending until the first frees it.
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: rayjob-cq
spec:
  namespaceSelector: {}
  resourceGroups:
    - coveredResources: ["cpu", "memory", "nvidia.com/gpu"]
      flavors:
        - name: gpu-flavor
          resources:
            - name: cpu
              nominalQuota: "100"
            - name: memory
              nominalQuota: "200Gi"
            - name: nvidia.com/gpu
              nominalQuota: "8"
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  namespace: rayjob
  name: rayjob-queue
spec:
  clusterQueue: rayjob-cq
