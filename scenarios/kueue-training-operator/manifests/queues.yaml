apiVersion: v1
kind: Namespace
metadata:
  name: training
---
# Quota covers cpu + nvidia.com/gpu. nvidia.com/gpu is the binding constraint:
# one TrainJob runs 2 training nodes x 8 GPUs = 16 GPUs, so the quota of 16
# admits exactly one TrainJob. A second TrainJob's whole gang stays Pending
# until the first releases its GPUs.
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: training-cq
spec:
  namespaceSelector: {}
  resourceGroups:
    - coveredResources: ["cpu", "nvidia.com/gpu"]
      flavors:
        - name: gpu-flavor
          resources:
            - name: cpu
              nominalQuota: "100"
            - name: nvidia.com/gpu
              nominalQuota: "16"
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  namespace: training
  name: training-queue
spec:
  clusterQueue: training-cq
