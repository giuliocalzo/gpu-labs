apiVersion: v1
kind: Namespace
metadata:
  name: preemption
---
# withinClusterQueue: LowerPriority lets a high-priority workload evict a running
# lower-priority one in the same queue when there isn't enough free quota.
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: preemption-cq
spec:
  namespaceSelector: {}
  preemption:
    withinClusterQueue: LowerPriority
  resourceGroups:
    - coveredResources: ["cpu", "nvidia.com/gpu"]
      flavors:
        - name: gpu-flavor
          resources:
            - name: cpu
              nominalQuota: "100"
            - name: nvidia.com/gpu
              nominalQuota: "32"
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  namespace: preemption
  name: preemption-queue
spec:
  clusterQueue: preemption-cq
