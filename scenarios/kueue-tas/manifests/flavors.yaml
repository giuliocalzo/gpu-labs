# Topology-aware building blocks used only by the kueue-tas scenario.
# (The plain, shared gpu-flavor lives in base/flavors.yaml.)
apiVersion: kueue.x-k8s.io/v1beta2
kind: Topology
metadata:
  name: default
spec:
  levels:
    - nodeLabel: cloud.provider.com/topology-block
    - nodeLabel: cloud.provider.com/topology-rack
    - nodeLabel: kubernetes.io/hostname
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: tas-gpu-flavor
spec:
  nodeLabels:
    cloud.provider.com/node-group: tas-group
  topologyName: default
