apiVersion: v1
kind: Namespace
metadata:
  name: priority
---
# 32 GPUs = room for exactly 4 jobs of 8 GPUs. No preemption here: the point is
# that admission ORDER follows workload priority, not that running jobs get evicted.
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: priority-cq
spec:
  namespaceSelector: {}
  # Start held so ALL jobs pile up as pending; the scenario releases admission
  # afterwards, so Kueue admits strictly in priority order.
  stopPolicy: Hold
  resourceGroups:
    - coveredResources: ["cpu", "nvidia.com/gpu"]
      flavors:
        - name: gpu-flavor
          resources:
            - name: cpu
              nominalQuota: "100"
            - name: nvidia.com/gpu
              nominalQuota: "32"
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  namespace: priority
  name: priority-queue
spec:
  clusterQueue: priority-cq
